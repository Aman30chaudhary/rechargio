version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: recharge_portal_db
    environment:
      MYSQL_ROOT_PASSWORD: ''
      MYSQL_DATABASE: recharge_portal
      MYSQL_ALLOW_EMPTY_PASSWORD: 'true'
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
